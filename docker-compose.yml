services:
  django_web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unireserve_django
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - PAYMENTS_SERVICE_URL=http://flask_microservice:5000/api/v2/payments/process
      - PAYMENTS_HTTP_TIMEOUT=5
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
    expose:
      - "8000"
    ports:
      - "8000:8000"
    depends_on:
      - flask_microservice
    networks:
      - unireserve_net

  flask_microservice:
    build:
      context: ./flask_microservice
      dockerfile: Dockerfile
    container_name: unireserve_flask_payments
    environment:
      - PORT=5000
    expose:
      - "5000"
    ports:
      - "5000:5000"
    networks:
      - unireserve_net

  nginx:
    image: nginx:1.27-alpine
    container_name: unireserve_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - django_web
      - flask_microservice
    networks:
      - unireserve_net

networks:
  unireserve_net:
    driver: bridge
